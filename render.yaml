services:
  - type: web
    name: infiniteprofit-saas
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://nztnctrkmfrgclrnflfa.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        value: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im56dG5jdHJrbWZyZ2Nscm5mbGZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NDEyNzEsImV4cCI6MjA5MzQxNzI3MX0.GpBf50JXc8sorlE29_W2ej0zNEeYpAuv3Fg3JiBQ-U4
      - key: VITE_SUPABASE_PROJECT_ID
        value: nztnctrkmfrgclrnflfa
      - key: VITE_ENABLE_GOOGLE_AUTH
        value: "false"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  - type: worker
    name: infiniteprofit-creative-worker
    runtime: docker
    dockerfilePath: ./workers/creative-processor/Dockerfile
    dockerContext: .
    envVars:
      - key: SUPABASE_URL
        value: https://nztnctrkmfrgclrnflfa.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CREATIVE_TRANSCRIPTION_PROVIDER
        value: openai
      - key: CREATIVE_TRANSCRIPTION_MODEL
        value: whisper-1
      - key: CREATIVE_ANALYSIS_PROVIDER
        value: anthropic
      - key: CREATIVE_ANALYSIS_MODEL
        value: claude-sonnet-4-20250514
      - key: CREATIVE_ANALYSIS_PROMPT_VERSION
        value: creative-sync-v4
      - key: CREATIVE_ANALYSIS_PROMPT
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CREATIVE_WORKER_POLL_INTERVAL_MS
        value: "5000"
      - key: CREATIVE_WORKER_BATCH_SIZE
        value: "2"
      - key: FFMPEG_PATH
        value: /usr/bin/ffmpeg
      - key: FFPROBE_PATH
        value: /usr/bin/ffprobe
